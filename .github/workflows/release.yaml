---
name: Release

# GHA requires bare `on:` which yamllint sees as boolean
# yamllint disable-line rule:truthy
on:
  release:
    types: [published]

jobs:
  release_zip_file:
    name: Prepare release asset
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
      - name: Get Version
        id: get_version
        # github.ref is unreliable for release events (it can resolve to the
        # target branch, not the tag); the release payload's tag_name always is.
        env:
          VERSION: ${{ github.event.release.tag_name }}
        run: echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Update versions
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
          WORKSPACE: ${{ github.workspace }}
        # sed commands with long paths are clearer on one line
        # yamllint disable rule:line-length
        run: |
          sed -i "/VERSION = /c\VERSION = \"${VERSION}\"" "${WORKSPACE}/custom_components/lock_code_manager/const.py"
          sed -i "/version/c\  \"version\": \"${VERSION}\"" "${WORKSPACE}/custom_components/lock_code_manager/manifest.json"
        # yamllint enable rule:line-length
      # Pack the lock_code_manager dir as a zip and upload to the release
      - name: ZIP Lock Code Manager Dir
        run: |
          cd ${{ github.workspace }}/custom_components/lock_code_manager
          zip lock_code_manager.zip -r ./
      - name: Upload zip to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ github.workspace }}/custom_components/lock_code_manager/lock_code_manager.zip
          asset_name: lock_code_manager.zip
          tag: ${{ github.event.release.tag_name }}
          overwrite: true
